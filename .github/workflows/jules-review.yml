name: Jules PR Code Review

# The workflow will run every time a Pull Request is opened or updated
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  jules-code-review:
    name: Code Review by Jules
    runs-on: ubuntu-latest

    # Necessary permissions for the agent to read the code and comment on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Jules Agent
        uses: google-labs-code/jules-action@v1 # Check for the latest version in the official repo
        with:
          # Here you give the specific instructions (the prompt) for its role
          prompt: |
            Act as a Senior Software Engineer and code reviewer. 
            Review the changes in this Pull Request focusing on:
            1. Potential security vulnerabilities.
            2. Performance issues.
            3. Uncovered edge cases.
            4. Best practices.
            5. Code quality.
            6. Code style.
            7. Code complexity.
            8. Code duplication.
            10. Code documentation.
            Please make sure to follow the conventions in our AGENTS.md file.

          # Pass the GitHub token so Jules can interact with the PR
          github-token: ${{ secrets.GITHUB_TOKEN }}

        env:
          # Your API key configured in the repository Secrets
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
